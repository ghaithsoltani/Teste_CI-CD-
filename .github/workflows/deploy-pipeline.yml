name: CI Pipeline - Deployment Fixed

on:
  push:
    paths:
      - '04-deployment-success-but-app-down/**'
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: 04-deployment-success-but-app-down

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Cleanup old container (IMPORTANT for self-hosted)
      - name: Cleanup old container
        run: docker rm -f prod-container || true

      # Build Docker image
      - name: Build Docker Image
        run: docker build -t prod-app .

      # Run container
      - name: Run Container
        run: docker run -d -p 5000:5000 --name prod-container prod-app

      # Wait for app AND verify it actually responds (real check, not blind sleep)
      - name: Wait for App (Fail if not ready)
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:5000; then
              echo "App is up!"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App failed to start"
          exit 1

      # Real health check — fails the pipeline if app returns an error status
      - name: Real Health Check
        run: curl -f http://localhost:5000

      # Only print success if we actually reached this point (previous steps passed)
      - name: Deployment Success Message
        run: echo "Deployment Successful"

      # Always cleanup, even if a previous step failed
      - name: Cleanup container
        if: always()
        run: docker stop prod-container && docker rm prod-container